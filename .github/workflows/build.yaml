name: Build & Upload APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease

      - name: Sign APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"* | sort -V | tail -1)
          KEYSTORE="${{ github.workspace }}/upload-keystore.jks"
          for apk in app/build/outputs/apk/release/*.apk; do
            echo "Signing $(basename "$apk")..."
            "$BUILD_TOOLS/zipalign" -p -f 4 "$apk" "${apk}.aligned"
            mv "${apk}.aligned" "$apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks "$KEYSTORE" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              "$apk"
          done

      - name: Collect APK outputs
        run: |
          mkdir -p outputs
          find . -type f -name "*.apk" -path "*/release/*" -exec cp {} outputs/ \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: outputs/
          if-no-files-found: error
